[crawl]
# Delay entre requests (segundos) — leve pra não estourar o TSE
delay_min = 1.5
delay_max = 3.5

# Retries em erro 5xx / timeout
max_retries = 5

# Timeout por request (segundos)
timeout = 30

# Eleição alvo
eleicao_id = "2045202024"
ano = "2024"
estado = "BR"

[targets]
# 29 partidos — Eleições Municipais 2024
partidos = [10, 11, 12, 13, 15, 16, 18, 20, 21, 22, 23, 25, 27, 28, 29, 30, 33, 35, 36, 40, 43, 44, 45, 50, 55, 65, 70, 77, 80]
